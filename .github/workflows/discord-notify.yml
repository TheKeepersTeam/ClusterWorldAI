name: Discord Notification

on:
  push:
    branches: [main, master]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord Webhook Notification
        uses: Ilshidur/action-discord@0.3.2
        with:
          args: "🚀 **{{ GITHUB_REPOSITORY }}**\n📝 {{ EVENT_NAME }} by {{ ACTOR }}\n🔗 https://github.com/{{ GITHUB_REPOSITORY }}/commit/{{ GITHUB_SHA }}"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USERNAME: Raccoon Bot
          DISCORD_AVATAR: https://avatars.githubusercontent.com/u/195688984
